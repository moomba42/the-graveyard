# TOML format, v0.5.0. https://github.com/toml-lang/toml

# The name of the mod loader type to load - for regular FML @Mod mods it should be javafml
modLoader = "javafml"
# A version range to match for said mod loader - for regular FML @Mod it will be the the FML version.
loaderVersion = "${loader_version_range}"
# The license for you mod.
license = "${mod_license}"
# A URL to refer people to when problems occur with this mod
issueTrackerURL="https://github.com/finallion/The-Graveyard-FORGE/issues" #optional

[[mods]]
# The modid of the mod
modId = "${mod_id}"
# The version number of the mod
version = "${mod_version}"
# A display name for the mod
displayName = "${mod_name}"
# A file name (in the root of the mod JAR) containing a logo for display
logoFile="graveyard.png" #optional
# A text field displayed in the mod UI
authors = "${mod_authors}" #optional
# The description text for the mod (multi line!) (#mandatory)
description = '''${mod_description}'''

# The [[mixins]] block allows you to declare your mixin config to FML so that it gets loaded.
[[mixins]]
config="${mod_id}.mixins.json"

# The [[accessTransformers]] block allows you to declare where your AT file is.
# If this block is omitted, a fallback attempt will be made to load an AT from META-INF/accesstransformer.cfg
[[accessTransformers]]
file="META-INF/accesstransformer.cfg"

# The coremods config file path is not configurable and is always loaded from META-INF/coremods.json

[[dependencies."${mod_id}"]]
    modId = "neoforge"
    type = "required"
    versionRange = "${neo_version_range}"
    ordering = "NONE"
    side = "BOTH"
[[dependencies."${mod_id}"]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"
[[dependencies."${mod_id}"]]
    modId = "geckolib"
    type = "required"
    versionRange = "${geckolib_version_range}"
    ordering = "NONE"
    side = "BOTH"
